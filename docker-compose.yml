services:
  postgres:
    image: postgres:16-alpine
    container_name: billullo-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: billullo
      POSTGRES_USER: billullo
      POSTGRES_PASSWORD: billullo_dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billullo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
